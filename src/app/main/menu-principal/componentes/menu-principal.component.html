<header class="header">
    <div class="logo-container">
        <div class="logo-placeholder">
            <img src="" alt="Ariadna Logo"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
            <span style="display: none; font-weight: bold; font-size: 1.2rem; color: #1e3a8a;">ARIADNA</span>
        </div>
    </div>

    <h1 class="title">ARIADNA APP</h1>

    <div class="actions">
        <div class="user-profile" *ngIf="perfilActual">
            <span class="user-name">{{ perfilActual.nombre }}</span>
            <img [src]="perfilActual.imagen" alt="Perfil del usuario" class="user-avatar" />
        </div>

        <button class="btn-agenda" (click)="abrirAgenda()">
            <mat-icon>calendar_month</mat-icon>
            Agenda
        </button>
        <button class="btn-salir" (click)="salir()">
            <mat-icon>exit_to_app</mat-icon>
            Salir
        </button>
    </div>
</header>

<main class="main-content">
    <div class="cards-grid" *ngIf="opciones.length >= 3">
        <div class="card card-top" (click)="navegarA(opciones[0].ruta)">
            <div class="card-image-placeholder"></div>
            <div class="card-title">{{ opciones[0].titulo }}</div>
        </div>
        <div class="card card-bottom-left" (click)="navegarA(opciones[1].ruta)">
            <div class="card-image-placeholder"></div>
            <div class="card-title">{{ opciones[1].titulo }}</div>
        </div>

        <div class="card card-bottom-right" (click)="navegarA(opciones[2].ruta)">
            <div class="card-image-placeholder"></div>
            <div class="card-title">{{ opciones[2].titulo }}</div>
        </div>
    </div>
</main>
