<div class="juego-layout">
    <header class="header">
        <button class="btn-circle" (click)="volver()">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                stroke-linecap="round" stroke-linejoin="round" class="icon-back">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>
        <button class="btn-circle btn-help">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                class="icon-help">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
        </button>
    </header>

    <main class="main-content">
        <div class="image-area">
            <img src="/imagenes/juego2-hablar-escribir.png" alt="Imagen del juego" class="juego-img" />
        </div>
    </main>

    <footer class="footer">
        <button class="btn-finalizar" (click)="finalizar()">
            Finalizar
        </button>
    </footer>
</div>
