<div class="actividades-container">
    <header class="header">
        <button class="btn-back" (click)="volver()">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-back">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>
        <div class="header-right">
            <span class="nivel-text">Nivel Alumno 3</span>
        </div>
    </header>

    <main class="main-content">
        <h1 class="title">Juegos de la Mente</h1>
        <div class="juego-container">
            <button class="btn-juego" (click)="iniciarJuego()">
                Iniciar juegos
            </button>
        </div>
    </main>
</div>
