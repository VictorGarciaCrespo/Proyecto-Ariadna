<main class="perfiles-container">
    <h1 class="titulo">Elige tu perfil</h1>

    <div class="botones-grid">
        <button class="btn-perfil" *ngFor="let perfil of perfiles" (click)="seleccionarPerfil(perfil.ruta)">
            <div class="btn-imagen"></div>
            <span class="btn-nombre">{{ perfil.nombre }}</span>
        </button>
    </div>
</main>
