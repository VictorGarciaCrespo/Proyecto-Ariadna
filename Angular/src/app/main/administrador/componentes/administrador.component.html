<!-- Panel de Administrador — Patrón Ariadna TEA -->
<div class="administrador-container">
  <h1>Panel de Administrador</h1>

  <div class="actions-section">
    <button mat-raised-button color="primary" (click)="abrirDialogoAlumno()">
      Añadir Alumno
    </button>
    <button mat-raised-button color="accent" (click)="abrirDialogoActualizar()">
      Actualizar Alumno
    </button>
    <button mat-raised-button color="warn" (click)="abrirDialogoEliminar()">
      Eliminar Alumno
    </button>
  </div>
</div>
