<div class="pagina-juego">
    
    <div class="cabecera">
        <button class="btn-icono redondo" routerLink="/juegos-mente">
            <mat-icon>arrow_back</mat-icon>
        </button>
        <h1 class="titulo-juego">Encuentra las Parejas</h1>
        <div style="display:flex; gap:8px;">
            <button class="btn-icono redondo" (click)="sonidoService.toggle()" [title]="(sonidoService.activo$ | async) ? 'Desactivar sonido' : 'Activar sonido'">
                <mat-icon>{{ (sonidoService.activo$ | async) ? 'volume_up' : 'volume_off' }}</mat-icon>
            </button>
            <button class="btn-icono redondo" routerLink="/menu-principal" title="Volver al menú principal">
                <mat-icon>home</mat-icon>
            </button>
        </div>
    </div>

    <div *ngIf="!juegoTerminado" class="contenedor-juego">
        <app-juego-memoria [cartas]="cartas" (cartaClickeada)="manejarCartaClickeada($event)">
        </app-juego-memoria>
    </div>
    
    
    <div class="pie-pagina">
        <button class="btn-siguiente" (click)="siguienteJuego()">
            {{ esUltimo ? 'Finalizar' : 'Siguiente' }}
            <mat-icon *ngIf="!esUltimo">arrow_forward</mat-icon>
        </button>
    </div>

    
    <div *ngIf="juegoTerminado" class="contenedor-juego pantalla-victoria">
        <div class="victoria-card">
            <div class="victoria-emoji">🎉</div>
            <h2 class="victoria-titulo">¡Lo has conseguido!</h2>
            <p class="victoria-subtitulo">Has encontrado todas las parejas</p>
            <div class="victoria-botones">
                <button class="btn-volver-jugar" (click)="iniciarJuego()">
                    <mat-icon>refresh</mat-icon>
                    Jugar de Nuevo
                </button>
                <button class="btn-otro-juego" (click)="siguienteJuego()">
                    {{ esUltimo ? 'Finalizar' : 'Siguiente juego' }}
                    <mat-icon *ngIf="!esUltimo">arrow_forward</mat-icon>
                </button>
            </div>
        </div>
    </div>

    
    <div class="credito-arasaac">
        <img src="/imagenes/arasaac-logo.png" alt="Logo ARASAAC" class="credito-arasaac__logo">
        <span class="credito-arasaac__texto">Pictogramas propiedad de Arasaac</span>
    </div>
</div>
