<div class="pagina-juego">
  <!-- CABECERA -->
  <div class="cabecera">
    <button class="btn-icono redondo" routerLink="/juegos-mente">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1 class="titulo-juego">Encuentra el intruso</h1>
    <div style="display:flex; gap:8px;">
      <button class="btn-icono redondo" (click)="sonidoService.toggle()"
        [title]="(sonidoService.activo$ | async) ? 'Desactivar sonido' : 'Activar sonido'">
        <mat-icon>{{ (sonidoService.activo$ | async) ? 'volume_up' : 'volume_off' }}</mat-icon>
      </button>
      <button class="btn-icono redondo" routerLink="/menu-principal" title="Volver al menú principal">
        <mat-icon>home</mat-icon>
      </button>
    </div>
  </div>

  <!-- JUEGO ACTIVO -->
  <div *ngIf="!juegoTerminado" class="contenedor-juego">

    <!-- PROGRESO -->
    <div class="progreso">
      <span class="progreso-texto">Ronda {{ rondaActualIndex + 1 }} de {{ totalRondas }}</span>
      <div class="barra-progreso">
        <div class="barra-progreso__relleno"
          [style.width.%]="((rondaActualIndex) / totalRondas) * 100"></div>
      </div>
    </div>

    <!-- INSTRUCCIÓN -->
    <p class="instruccion">¿Cuál de estas imágenes <strong>no pertenece</strong> al grupo?</p>

    <!-- GRID DE IMÁGENES -->
    <div class="grid-imagenes">
      <div
        *ngFor="let imagen of rondaActual.imagenes; let i = index"
        class="carta-imagen"
        [ngClass]="getClaseImagen(i)"
        (click)="seleccionarImagen(imagen, i)">

        <div class="carta-imagen__marco">
          <img [src]="imagen.ruta" [alt]="imagen.nombre" class="carta-imagen__img" />
          <div *ngIf="imagenSeleccionadaIndex === i && estadoSeleccion === 'correcto'" class="marca-correcta">
            <span class="tick-text">✅</span>
          </div>
          <div *ngIf="imagenSeleccionadaIndex === i && estadoSeleccion === 'incorrecto'" class="marca-incorrecta">
            <span class="cross-text">❌</span>
          </div>
        </div>

      </div>
    </div>

    <!-- BOTÓN SIGUIENTE (esquina inferior derecha) -->
    <div class="pie-pagina">
      <button class="btn-siguiente" (click)="siguienteJuego()">
        Siguiente
        <mat-icon>arrow_forward</mat-icon>
      </button>
    </div>

  </div>

  <!-- PANTALLA DE VICTORIA ESTÁNDAR -->
  <div *ngIf="juegoTerminado" class="pantalla-victoria">
    <div class="victoria-card">
      <div class="victoria-emoji">🎉</div>
      <h2 class="victoria-titulo">¡Muy bien!</h2>
      <p class="victoria-subtitulo">Has encontrado todos los intrusos correctamente</p>
      <div class="victoria-botones">
        <button class="btn-volver-jugar" (click)="reiniciarJuego()">
          <mat-icon>replay</mat-icon>
          Volver a jugar
        </button>
        <button class="btn-otro-juego" (click)="siguienteJuego()">
          <mat-icon>swap_horiz</mat-icon>
          Otro juego
        </button>
      </div>
    </div>
  </div>

  <!-- CRÉDITO -->
  <div class="credito-soyvisual">
    <span>Pictogramas propiedad de Soy Visual</span>
  </div>
</div>
